<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>頻道社群分析儀表板</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-stage">
        <section id="directory-page" class="directory-page" aria-live="polite">
          <header class="directory-header">
            <div>
              <div class="brand-kicker">頻道社群分析工具</div>
              <h1>頻道社群分析儀表板</h1>
            </div>
            <div class="data-scope" id="global-stats"></div>
          </header>

          <div class="directory-toolbar">
            <label>
              <span>搜尋頻道</span>
              <input id="search" type="search" placeholder="輸入頻道名稱" autocomplete="off" />
            </label>
            <label>
              <span>訂閱門檻</span>
              <select id="subscriber-filter">
                <option value="0">全部</option>
                <option value="500000">50 萬以上</option>
                <option value="1000000">100 萬以上</option>
              </select>
            </label>
          </div>

          <div id="examples" class="case-table"></div>
        </section>

        <section id="analysis-page" class="analysis-page" hidden>
          <header class="stage-header">
          <div>
            <h2 id="channel-title">載入中</h2>
            <p id="channel-meta"></p>
          </div>
          <div class="stage-actions">
            <button id="back-to-directory" class="public-link" type="button">所有案例</button>
          </div>
          </header>

          <nav id="view-tabs" class="view-tabs" aria-label="分析頁面"></nav>

          <section id="page-content" class="page-content" aria-live="polite">
            <div class="loading-panel">正在載入分析資料…</div>
          </section>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
